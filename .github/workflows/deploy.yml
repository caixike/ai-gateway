name: Deploy to Cloudflare Workers

on:
  workflow_dispatch: # 允许手动触发
  # push:
  #   branches:
  #     - main

# 部署所需权限
permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate wrangler.toml with admin credentials
        run: |
          DEFAULT_URLS=(
            "https://opencode.ai.cmliussss.net/zen/v1"
            "https://opencode.fastly.cmliussss.net/zen/v1"
            "https://opencode.gcore.cmliussss.net/zen/v1"
          )
          MIRRORS_URL=$(printf '%s\\n' "${DEFAULT_URLS[@]}" | sed '$s/\\n$//')
          EXTRA_URLS="${{ vars.OPENCODE_MIRRORS_URL }}"
          if [ -n "$EXTRA_URLS" ]; then
            MIRRORS_URL="${MIRRORS_URL}\n${EXTRA_URLS}"
          fi
          cat > wrangler.toml << EOF
          name = "ai-gateway"
          main = "src/index.ts"
          compatibility_date = "2025-07-01"
          compatibility_flags = ["nodejs_compat"]
          keep_vars = true

          [[kv_namespaces]]
          binding = "KV"

          [vars]
          ADMIN_USERNAME = ${{ vars.ADMIN_USERNAME }}
          ADMIN_PASSWORD = ${{ vars.ADMIN_PASSWORD }}
          OPENCODE_MIRRORS_URL = "${MIRRORS_URL}"
          EOF

      - name: Build (dry-run)
        run: npm run build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
