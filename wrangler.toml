name = "ai-gateway"
main = "src/index.ts"
compatibility_date = "2025-07-01"
compatibility_flags = ["nodejs_compat"]
keep_vars = true

# KV namespace — wrangler will auto-resolve by name
[[kv_namespaces]]
binding = "KV"

# Admin credentials (set these in Cloudflare Dashboard > Workers > Variables)
# [vars]
# ADMIN_USERNAME = "admin"
# ADMIN_PASSWORD = "your-password"
# OPENCODE_MIRRORS_URL = "https://opencode.ai.cmliussss.net/zen/v1\nhttps://opencode.fastly.cmliussss.net/zen/v1\nhttps://opencode.gcore.cmliussss.net/zen/v1"
